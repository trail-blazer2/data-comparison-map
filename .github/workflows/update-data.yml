name: Fetch Fresh Data

on:
  # NO schedule — you trigger this manually when you want fresh data
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all data sources
        run: node fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet --exit-code || git commit -m "📊 Update data $(date -u +'%Y-%m-%d')"
          git push
